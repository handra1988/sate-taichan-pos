<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Sate Taichan Ria</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tambahan style popup/modal input jumlah */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 12px;
            width: 90%; max-width: 320px; text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-bottom: 15px; color: #333; }
        .qty-input-group {
            display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px;
        }
        .btn-qty {
            background: #e2e8f0; border: none; font-size: 1.5rem; font-weight: bold;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
        }
        #modal-qty {
            width: 60px; text-align: center; font-size: 1.3rem; font-weight: bold; border: none; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; }
        .btn-cancel { background: #cbd5e1; color: #333; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: #ff4e50; color: white; border: none; flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Sate Taichan Ria 🍢</h1>
            <div id="monitor-omzet">Total Omzet Hari Ini: <span id="total-omzet">Rp 0</span></div>
        </header>

        <main class="kasir-container">
            <section class="menu-section">
                <h2>Daftar Menu 🔥</h2>
                <div class="menu-grid" id="container-menu">
                    </div>
            </section>

            <section class="cart-section">
                <h2>Keranjang Belanja</h2>
                
                <ul id="daftar-keranjang">
                    </ul>
                
                <div class="total">Total: <span id="total-harga">Rp 0</span></div>
                <button id="btn-bayar" onclick="prosesPembayaran()">Bayar & Simpan ke Cloud</button>
            </section>
        </main>
    </div>

    <div id="popup-qty" class="modal">
        <div class="modal-content">
            <h3 id="modal-menu-title">Jumlah Pesanan</h3>
            <div class="qty-input-group">
                <button class="btn-qty" onclick="ubahQty(-1)">-</button>
                <input type="number" id="modal-qty" value="1" min="1">
                <button class="btn-qty" onclick="ubahQty(1)">+</button>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="tutupModal()">Batal</button>
                <button class="btn-confirm" onclick="konfirmasiTambahKeKeranjang()">Tambah</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO1azSolglCV-xJrlmZ5WKWb7Cec9ZrZI",
            authDomain: "sate-taichan-pos.firebaseapp.com",
            projectId: "sate-taichan-pos",
            storageBucket: "sate-taichan-pos.firebasestorage.app",
            messagingSenderId: "753807128515",
            appId: "1:753807128515:web:91ef30cdb7dd2fa54eaf76",
            measurementId: "G-4QB3L8971E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;

        const script = document.createElement('script');
        script.src = 'app.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
